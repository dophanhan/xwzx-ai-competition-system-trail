<!DOCTYPE html>

</head>
<body>

        <div class="hero-section">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <p class="theme-text">I CAN I UP</p>
                <h1>学位中心 AI 创新大赛</h1>
                <p class="subtitle">报名与成果提交系统</p>
            </div>
        </div>
        
        <main class="main-content">
            <div class="card-container">
                <div class="card" onclick="window.location.href='registration.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" fill="none">
                            <!-- 文档背景 -->
                            <rect x="18" y="14" width="60" height="68" rx="6" fill="rgba(102, 126, 234, 0.15)" stroke="rgba(102, 126, 234, 0.6)" stroke-width="2"/>
                            <!-- 文档内线条 -->
                            <path d="M28 32h40M28 46h40M28 60h28" stroke="rgba(102, 126, 234, 0.8)" stroke-width="2.5" stroke-linecap="round"/>
                            <!-- 勾选圆圈背景 -->
                            <circle cx="68" cy="72" r="14" fill="url(#grad1)"/>
                            <!-- 勾选标记 -->
                            <path d="M62 72l4 4 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                            <!-- 渐变定义 -->
                            <defs>
                                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h2>参赛报名</h2>
                    <p>填写参赛队伍信息，完成报名流程</p>
                    <button class="btn btn-primary">立即报名 <span>→</span></button>
                    <p class="card-note">📢 不设报名时间，只要有想法随时可报名</p>
                </div>
                
                <div class="card" onclick="window.location.href='submission.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" fill="none">
                            <!-- 上传箭头 -->
                            <path d="M48 22v42M32 42l16-16 16 16" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                            <!-- 底座托盘 -->
                            <rect x="24" y="64" width="48" height="14" rx="4" fill="rgba(102, 126, 234, 0.12)" stroke="rgba(102, 126, 234, 0.6)" stroke-width="2"/>
                            <!-- 渐变定义 -->
                            <defs>
                                <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h2>成果提交</h2>
                    <p>上传赛事成果，提交参赛作品</p>
                    <button class="btn btn-primary">提交成果 <span>→</span></button>
                    <p class="card-note">🔄 随时可以提交成果，如有修改可再次提交，不限次数</p>
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <p>&copy; 2026 学位中心 AI 创新大赛</p>
