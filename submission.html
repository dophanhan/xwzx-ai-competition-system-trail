<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成果提交 - 学位中心 AI 创新大赛</title>
    <link rel="stylesheet" href="styles.css">
    <!-- 禁止缓存 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div class="container">
        <div class="hero-section">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>学位中心 AI 创新大赛</h1>
                <p class="subtitle">成果提交</p>
            </div>
        </div>
        
        <main class="main-content">
            <div class="form-container">
                <a href="index.html" class="back-btn">← 返回首页</a>
                
                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>
                
                <form id="submission-form">
                    <div class="form-group">
                        <label>队伍名称 <span class="required">*</span></label>
                        <select id="teamName" required>
                            <option value="">请选择队伍</option>
                        </select>
                        <div id="loadingTeams" style="color: #666; font-size: 12px; margin-top: 4px;">正在加载队伍列表...</div>
                    </div>
                    
                    <div class="form-group">
                        <label>成果名称 <span class="required">*</span></label>
                        <input type="text" id="projectName" placeholder="请输入成果名称（最多 100 字）" required maxlength="100">
                        <div class="char-count"><span id="projectNameCount">0</span>/100</div>
                    </div>
                    
                    <div class="form-group">
                        <label>团队简要分工 <span class="required">*</span></label>
                        <textarea id="teamRoles" placeholder="请简要说明团队成员的分工情况（最多 500 字）" required maxlength="500" rows="4"></textarea>
                        <div class="char-count"><span id="teamRolesCount">0</span>/500</div>
                    </div>
                    
                    <div class="form-group">
                        <label>成果简要说明 <span class="required">*</span></label>
                        <textarea id="projectDescription" placeholder="请简要说明成果内容、创新点等（最多 1000 字）" required maxlength="1000" rows="6"></textarea>
                        <div class="char-count"><span id="projectDescriptionCount">0</span>/1000</div>
                    </div>
                    
                    <div class="form-group">
                        <label>成果在线链接（可选）</label>
                        <input type="url" id="projectLink" placeholder="例如：https://github.com/xxx 或 https://demo.example.com">
                    </div>
                    
                    <div class="form-group">
                        <label>本地附件上传（可选，支持视频，最大 20MB）</label>
                        <div class="file-upload-area" id="fileUploadArea">
                            <div class="file-icon">📁</div>
                            <p>点击或拖拽文件到此处上传</p>
                            <p class="file-hint">支持所有常见格式，单个文件最大 20MB</p>
                            <input type="file" id="fileInput" style="display: none;" multiple>
                        </div>
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="file-list" id="fileList"></div>
                    </div>
                    
                    <div class="form-buttons">
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">取消</button>
                        <button type="submit" class="btn btn-primary">提交成果</button>
                    </div>
                </form>
            </div>
        </main>
        
        <footer class="footer">
            <p>&copy; 2026 学位中心 AI 创新大赛</p>
            <p class="ai-notice">本网页由 AI 生成，如有问题还麻烦及时反馈</p>
        </footer>
    </div>
    
    <div id="success-modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">✅</div>
            <h2>提交成功！</h2>
            <p>您的赛事成果已成功提交。</p>
            <button class="btn btn-primary" onclick="closeModalAndRedirect()">返回首页</button>
        </div>
    </div>
    
    <!-- 加载配置文件 -->
    <script src="config.js?v=20260330"></script>
    <!-- 加载成果提交脚本 -->
    <script src="submission.js?v=20260330"></script>
</body>
</html>
