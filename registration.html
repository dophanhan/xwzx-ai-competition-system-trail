<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 学位中心 AI 创新大赛</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="hero-section">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>2026 学位中心 AI 创新大赛</h1>
                <p class="subtitle">参赛报名</p>
            </div>
        </div>
        
        <main class="main-content">
            <div class="form-container">
                <a href="index.html" class="back-btn">← 返回首页</a>
                
                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>
                
                <form id="registration-form">
                    <div class="form-group">
                        <label>队伍名称 <span class="required">*</span></label>
                        <input type="text" id="teamName" placeholder="请输入队伍名称" required>
                    </div>
                    
                    <div class="form-group">
                        <label>队伍人员信息 <span class="required">*</span>（1-3 人）</label>
                        <div class="team-members" id="teamMembers">
                        </div>
                        <button type="button" class="btn btn-add" id="addMemberBtn" style="margin-top: 15px;">+ 添加队员</button>
                    </div>
                    
                    <div class="form-buttons">
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">取消</button>
                        <button type="submit" class="btn btn-primary">确认报名</button>
                    </div>
                </form>
            </div>
        </main>
        
        <footer class="footer">
            <p>&copy; 2026 学位中心 AI 创新大赛组委会</p>
            <p>本网页由 AI 生成，如有问题还麻烦及时反馈</p>
        </footer>
    </div>
    
    <div id="success-modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">✅</div>
            <h2>报名成功！</h2>
            <p>您的队伍已成功报名参加学位中心 AI 创新大赛。</p>
            <button class="btn btn-primary" onclick="closeModalAndRedirect()">返回首页</button>
        </div>
    </div>
    
    <!-- 加载配置文件 -->
    <script src="config.js"></script>
    <!-- 加载报名表单脚本 -->
    <script src="registration.js"></script>
</body>
</html>
